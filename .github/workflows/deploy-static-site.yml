# crservers.com — reusable workflow: checkout caller repo -> pnpm install/build/verify -> FTP deploy.
# Caller: uses: edenia/crservers-static-deploy/.github/workflows/deploy-static-site.yml@<ref>
#          secrets: inherit

name: crservers.com static site deploy

on:
  workflow_call:
    inputs:
      node_version:
        description: Node.js version for setup-node
        type: string
        required: false
        default: "20"
      pnpm_version:
        description: pnpm major version for pnpm/action-setup
        type: string
        required: false
        default: "9"
      install_command:
        description: Install dependencies (trusted — repo maintainers only)
        type: string
        required: false
        default: "pnpm install --frozen-lockfile"
      build_command:
        description: Production build (trusted — repo maintainers only)
        type: string
        required: false
        default: "pnpm build"
      verify_command:
        description: Post-build check; skipped when skip_verify is true
        type: string
        required: false
        default: "pnpm run verify:static-out"
      skip_verify:
        description: Skip the verify step
        type: boolean
        required: false
        default: false
      artifact_name:
        type: string
        required: false
        default: "static-out"
      artifact_path:
        description: Path relative to repo root to upload
        type: string
        required: false
        default: "out/"
      artifact_retention_days:
        type: number
        required: false
        default: 7
      ftp_protocol:
        type: string
        required: false
        default: "ftps"
      ftp_local_dir:
        description: Local folder for FTP-Deploy-Action (must end with /)
        type: string
        required: false
        default: "./out/"
      ftp_timeout_ms:
        type: number
        required: false
        default: 1200000
      dry_run:
        description: FTP dry run (no upload)
        type: boolean
        required: false
        default: false
      clean_deploy:
        description: DANGER — delete entire remote FTP_REMOTE_PATH before sync
        type: boolean
        required: false
        default: false
    secrets:
      FTP_HOST:
        required: true
      FTP_USER:
        required: true
      FTP_PASSWORD:
        required: true
      FTP_REMOTE_PATH:
        required: true
      SITE_URL:
        description: Optional public site URL (store as a repository secret in the customer repo)
        required: false

permissions:
  contents: read
  actions: write

concurrency:
  group: crservers-static-${{ github.repository }}
  cancel-in-progress: true

jobs:
  build:
    name: crservers.com — build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm_version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm

      - name: Install dependencies
        env:
          INSTALL_COMMAND: ${{ inputs.install_command }}
        run: bash -eo pipefail -c "$INSTALL_COMMAND"

      - name: Build static site
        env:
          BUILD_COMMAND: ${{ inputs.build_command }}
        run: bash -eo pipefail -c "$BUILD_COMMAND"

      - name: Verify static export
        if: ${{ inputs.skip_verify == false }}
        env:
          VERIFY_COMMAND: ${{ inputs.verify_command }}
        run: bash -eo pipefail -c "$VERIFY_COMMAND"

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_path }}
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}

  deploy:
    name: crservers.com — deploy (FTP)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 45
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: out

      - name: Check FTP secrets
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_PATH: ${{ secrets.FTP_REMOTE_PATH }}
        run: |
          set -e
          missing=0
          for v in FTP_HOST FTP_USER FTP_PASSWORD FTP_REMOTE_PATH; do
            eval "val=\${$v}"
            if [ -z "$val" ]; then echo "::error::Missing secret: $v"; missing=1; fi
          done
          case "$FTP_REMOTE_PATH" in
            */) ;;
            *) echo "::error::FTP_REMOTE_PATH must end with a forward slash (e.g. public_html/site/)."; missing=1 ;;
          esac
          exit "$missing"

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ inputs.ftp_protocol }}
          local-dir: ${{ inputs.ftp_local_dir }}
          server-dir: ${{ secrets.FTP_REMOTE_PATH }}
          log-level: ${{ inputs.dry_run && 'verbose' || 'standard' }}
          dry-run: ${{ inputs.dry_run }}
          dangerous-clean-slate: ${{ inputs.clean_deploy }}
          timeout: ${{ inputs.ftp_timeout_ms }}

      - name: Job summary
        if: always()
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          DRY_RUN: ${{ inputs.dry_run }}
          CLEAN_DEPLOY: ${{ inputs.clean_deploy }}
        run: |
          {
            echo "## crservers.com deploy"
            echo "- **Event:** ${EVENT_NAME}"
            echo "- **Ref:** \`${REF}\` @ \`${SHA}\`"
            echo "- **Dry run:** ${DRY_RUN}"
            echo "- **Clean slate:** ${CLEAN_DEPLOY}"
          } >> "$GITHUB_STEP_SUMMARY"
